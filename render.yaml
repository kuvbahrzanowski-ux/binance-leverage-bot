services:
  - type: web
    name: binance-leverage-bot-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET_KEY
        sync: false
      - key: BINANCE_TESTNET
        value: "True"
      - key: TRADING_MODE
        value: "SIGNAL_ONLY"
      - key: DATABASE_URL
        sync: false  # Tutaj nalezy wkleic URL bazy danych PostgreSQL (np. z Supabase)
      - key: MAX_POSITION_USDT
        value: "100"
      - key: DEFAULT_LEVERAGE
        value: "10"
