services:
  - type: web
    name: binance-leverage-bot-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET_KEY
        sync: false
      - key: BINANCE_TESTNET
        value: "True"
      - key: TRADING_MODE
        value: "SIGNAL_ONLY"
      - key: DATABASE_URL
        value: postgresql://postgres.qtfwkxmtrfchgmkxaduu:S95CVcjViCTfR7nk@aws-0-eu-west-3.pooler.supabase.com:6543/postgres
      - key: MAX_POSITION_USDT
        value: "100"
      - key: DEFAULT_LEVERAGE
        value: "10"
